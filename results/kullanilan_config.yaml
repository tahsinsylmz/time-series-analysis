    std: 0.3
    tohum_skab: 1000
    tohum_batadal: 2000
  unseen:
    aciklama: Sensor kazanc kaymasi sonrasi egitim sozlugunde bulunmayan pattern noktalari
    olcek_faktoru: 1.8
derin_ogrenme:
