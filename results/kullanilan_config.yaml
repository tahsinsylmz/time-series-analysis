  gizli_boyut: 48
  katman_sayisi: 1
  dropout: 0.2
  sinif_agirligi: true
  cnn_kernel: 3
  cihaz: cpu
otomata:
  window_size: 4
  alphabet_size: 3
  paa_bolme_faktoru: 2
  smoothing: laplace
  laplace_alpha: 1.0
  path_uzunlugu: 2
  unseen_ceza_agirligi: 1.0
  esik_stratejisi: f1_maks
  parametre_taramasi:
    window_size:
    - 3
    - 4
    - 5
    - 6
    alphabet_size:
    - 3
    - 4
    - 5
    - 6
