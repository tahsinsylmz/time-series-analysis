  pozitif_sinif: 1
  esik_aday_sayisi: 200
  tek_sinif_esik_persentili: 0.95
  unseen_eslesme_mesafe_esigi: 1
  istatistik_testleri:
  - wilcoxon
  - mcnemar
  mcnemar_dejenere_f1_esigi: 0.01
